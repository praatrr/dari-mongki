<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>dari mongki</title>
  <style>
    /* --- 1. SETTING UTAMA --- */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #000000;
      overflow: hidden;
      font-family: 'Courier New', Courier, monospace;
    }

    /* --- 2. TOMBOL MULAI --- */
    #start-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #000000;
      z-index: 10000;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #play-btn {
      padding: 15px 40px;
      font-size: 18px;
      background-color: #ff4de1;
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(255, 77, 225, 0.6);
      font-weight: bold;
      transition: transform 0.2s;
    }

    #play-btn:active {
      transform: scale(0.9);
    }

    /* --- 3. LOADING SCREEN (HAI BABI) --- */
    #loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #000000;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transition: opacity 1s ease-out;
    }

    .loading-text {
      display: flex;
      gap: 10px;
    }

    .loading-text span {
      font-size: 40px;
      font-weight: bold;
      color: #333;
      animation: nyala 1.2s infinite ease-in-out;
    }

    @keyframes nyala {
      0%, 100% {
        color: #333;
        text-shadow: none;
      }
      50% {
        color: #fff;
        text-shadow: 0 0 10px #a04dff, 0 0 20px #ff4d4d;
      }
    }

    .loading-text span:nth-child(1) { animation-delay: 0.0s; } 
    .loading-text span:nth-child(2) { animation-delay: 0.2s; } 
    .loading-text span:nth-child(3) { animation-delay: 0.4s; } 
    .loading-text span:nth-child(4) { animation-delay: 0.6s; } 
    .loading-text span:nth-child(5) { animation-delay: 0.8s; } 
    .loading-text span:nth-child(6) { animation-delay: 1.0s; } 
    .loading-text span:nth-child(7) { animation-delay: 1.2s; }

    #loading p {
      color: #888;
      margin-top: 20px;
      font-size: 14px;
      letter-spacing: 2px;
    }

    /* --- 4. CANVAS --- */
    #c {
      display: block;
    }

    /* --- 5. ANIMASI MENGETIK --- */
    #typing-text {
      position: fixed;
      top: 65%; /* Atur posisi teks di bawah hati */
      left: 50%;
      transform: translateX(-50%);
      color: #ff4de1;
      font-size: 28px;
      font-weight: bold;
      text-shadow: 0 0 15px rgba(255, 77, 225, 0.8);
      white-space: nowrap;
      pointer-events: none;
      z-index: 500;
    }

    /* Efek kursor ketik */
    #typing-text::after {
      content: '|';
      animation: blink 0.7s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
  </style>
</head>
<body>

  <div id="start-screen">
    <button id="play-btn">Klik Disini</button>
  </div>

  <div id="loading">
    <div class="loading-text">
      <span>H</span><span>A</span><span>I</span>
      &nbsp;
      <span>B</span><span>A</span><span>B</span><span>I</span>
    </div>
    <p>Sabar ya...</p>
  </div>

  <canvas id="c"></canvas>

  <div id="typing-text"></div>

  <audio id="lagu" loop hidden preload="auto">
    <source src="lagu.mp3" type="audio/mpeg">
  </audio>

  <script>
    (function() {
      const startScreen = document.getElementById("start-screen");
      const playBtn = document.getElementById("play-btn");
      const loader = document.getElementById("loading");
      const audio = document.getElementById("lagu");
      const typingArea = document.getElementById("typing-text");

      // --- LOGIKA KLIK TOMBOL ---
      playBtn.addEventListener('click', function() {
        if(audio) {
            audio.play().catch(function(error) {
                console.log("Audio play error: ", error);
            });
        }
        
        startScreen.style.display = "none";

        // Menunggu 9 detik untuk loading screen
        setTimeout(function() {
          loader.style.opacity = "0"; 
          setTimeout(function() {
            loader.style.display = "none";
            // Mulai ngetik "eeeaaakk" setelah loading hilang
            mulaiNgetik();
          }, 1000);
        }, 9000); 
      });

      // --- FUNGSI MENGETIK ---
      function mulaiNgetik() {
        const pesan = "eeeaaakk";
        let i = 0;
        function ketik() {
          if (i < pesan.length) {
            typingArea.innerHTML += pesan.charAt(i);
            i++;
            setTimeout(ketik, 250); // Kecepatan ketik
          }
        }
        ketik();
      }

      // --- LOGIKA CANVAS (ANIMASI HATI) ---
      const canvasElement = document.getElementById("c");
      const ctx = canvasElement.getContext("2d");
      let canvasWidth, canvasHeight, centerX, centerY;

      function resizeCanvas() {
        canvasWidth = canvasElement.width = window.innerWidth;
        canvasHeight = canvasElement.height = window.innerHeight;
        centerX = canvasWidth / 2;
        centerY = canvasHeight / 2;
      }
      resizeCanvas();
      window.addEventListener('resize', resizeCanvas);

      const degreesToRadians = Math.PI / 180;
      const particleCount = 400;
      const particleInstances = [];
      const colorPalette = ["217,65,65", "240,223,223", "255,161,161", "237,126,126", "240,96,137"];

      class SparkleParticle {
        constructor() { this.reset(); }
        reset() {
          this.radius = Math.floor(Math.random() * 6) + 2;
          const initialDist = Math.random() * 100 + 1;
          const initialAngle = Math.random() * 360;
          const angleInRadians = initialAngle * degreesToRadians;
          this.x = centerX + initialDist * Math.cos(angleInRadians);
          this.y = centerY + initialDist * Math.sin(angleInRadians);
          const speedFactor = Math.random() * 0.8;
          this.velocityX = speedFactor * (Math.random() < 0.5 ? -1 : 1);
          this.velocityY = speedFactor * (Math.random() < 0.5 ? -1 : 1);
          this.alpha = Math.random() * 0.8 + 0.1;
          const colorIndex = Math.floor(Math.random() * colorPalette.length);
          this.colorString = `rgba(${colorPalette[colorIndex]}, ${this.alpha})`;
        }
        move() {
          this.x += this.velocityX;
          this.y += this.velocityY;
        }
        reverseDirection() {
          this.velocityX *= -1;
          this.velocityY *= -1;
        }
        draw(context) {
          context.beginPath();
          context.arc(this.x, this.y, this.radius, 0, 2 * Math.PI);
          context.fillStyle = this.colorString;
          context.fill();
        }
      }

      for (let i = 0; i < particleCount; i++) {
        particleInstances.push(new SparkleParticle());
      }

      function defineHeartShape(particleRadius) {
        const heartSize = 100; 
        const safeRadius = Math.max(heartSize - particleRadius, 1);
        const topCurveY = centerY - 60; 
        const bottomPointY = centerY + 180;
        const leftCurveX = centerX - heartSize;
        const rightCurveX = centerX + heartSize;

        ctx.beginPath();
        ctx.moveTo(centerX, topCurveY);
        ctx.arc(rightCurveX, topCurveY, safeRadius, Math.PI, Math.PI * 0.23, false);
        ctx.lineTo(centerX, bottomPointY);
        ctx.arc(leftCurveX, topCurveY, safeRadius, Math.PI * 0.77, 0, false);
        ctx.closePath();
      }

      function renderAnimation() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.1)";
        ctx.fillRect(0, 0, canvasWidth, canvasHeight);
        for (let i = 0; i < particleInstances.length; i++) {
          const particle = particleInstances[i];
          defineHeartShape(particle.radius);
          if (ctx.isPointInPath(particle.x, particle.y)) {
            particle.move();
            particle.draw(ctx);
          } else {
            particle.reverseDirection();
            particle.move();
          }
        }
        window.requestAnimationFrame(renderAnimation);
      }
      window.requestAnimationFrame(renderAnimation);
    })();
  </script>
</body>
</html>
