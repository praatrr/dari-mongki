<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>dari mongki</title>
  <style>
    /* --- 1. SETTING UTAMA --- */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #000000;
      overflow: hidden;
      font-family: 'Courier New', Courier, monospace;
    }

    /* --- 2. TOMBOL MULAI --- */
    #start-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #000000;
      z-index: 10000; /* Paling depan saat awal */
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #play-btn {
      padding: 15px 40px;
      font-size: 18px;
      background-color: #ff4de1;
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(255, 77, 225, 0.6);
      font-weight: bold;
    }

    /* --- 3. LOADING SCREEN --- */
    #loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #000000;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transition: opacity 1s ease-out;
    }

    .loading-text span {
      font-size: 40px;
      font-weight: bold;
      color: #333;
      animation: nyala 1.2s infinite ease-in-out;
      display: inline-block;
    }

    @keyframes nyala {
      0%, 100% { color: #333; text-shadow: none; }
      50% { color: #fff; text-shadow: 0 0 10px #a04dff, 0 0 20px #ff4d4d; }
    }

    .loading-text span:nth-child(2) { animation-delay: 0.2s; }
    .loading-text span:nth-child(3) { animation-delay: 0.4s; }
    .loading-text span:nth-child(4) { animation-delay: 0.6s; }
    .loading-text span:nth-child(5) { animation-delay: 0.8s; }
    .loading-text span:nth-child(6) { animation-delay: 1.0s; }
    .loading-text span:nth-child(7) { animation-delay: 1.2s; }

    /* --- 4. TULISAN EEEAAAKK --- */
    #typing-text {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #ff4de1;
      font-size: 30px;
      font-weight: bold;
      text-shadow: 0 0 20px rgba(255, 77, 225, 0.8);
      z-index: 10001; /* DI ATAS CANVAS DAN LOADING */
      pointer-events: none;
      white-space: nowrap;
    }

    /* Efek kursor */
    #typing-text::after {
      content: '|';
      animation: blink 0.7s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* --- 5. CANVAS --- */
    #c {
      display: block;
      position: absolute;
      top: 0;
      left: 0;
      z-index: 1;
    }
  </style>
</head>
<body>

  <div id="start-screen">
    <button id="play-btn">Buka Pesan</button>
  </div>

  <div id="loading">
    <div class="loading-text">
      <span>H</span><span>A</span><span>I</span>
      &nbsp;
      <span>B</span><span>A</span><span>B</span><span>I</span>
    </div>
    <p style="color: #555; margin-top: 20px;">Sabar ya mblo...</p>
  </div>

  <div id="typing-text"></div>
  <canvas id="c"></canvas>

  <audio id="lagu" loop hidden preload="auto">
    <source src="lagu.mp3" type="audio/mpeg">
  </audio>

  <script>
    (function() {
      const startScreen = document.getElementById("start-screen");
      const playBtn = document.getElementById("play-btn");
      const loader = document.getElementById("loading");
      const audio = document.getElementById("lagu");
      const typingArea = document.getElementById("typing-text");

      // --- FUNGSI MENGETIK ---
      function mulaiNgetik() {
        const pesan = "eeeaaakk";
        let i = 0;
        typingArea.innerHTML = ""; // Bersihkan dulu
        
        function ketik() {
          if (i < pesan.length) {
            typingArea.innerHTML += pesan.charAt(i);
            i++;
            setTimeout(ketik, 200); 
          }
        }
        ketik();
      }

      // --- LOGIKA KLIK ---
      playBtn.addEventListener('click', function() {
        if(audio) audio.play().catch(e => console.log("Audio Error"));
        
        startScreen.style.display = "none";

        // Loading 5 detik
        setTimeout(function() {
          loader.style.opacity = "0"; 
          setTimeout(function() {
            loader.style.display = "none";
            // JALANKAN KETIKAN
            mulaiNgetik();
          }, 1000);
        }, 5000); 
      });

      // --- ANIMASI HATI (CANVAS) ---
      const canvas = document.getElementById("c");
      const ctx = canvas.getContext("2d");
      let w, h, centerX, centerY;

      function resize() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
        centerX = w / 2;
        centerY = h / 2;
      }
      window.addEventListener('resize', resize);
      resize();

      const particles = [];
      const colors = ["217,65,65", "255,161,161", "240,96,137"];

      class Particle {
        constructor() {
          this.reset();
        }
        reset() {
          this.x = centerX;
          this.y = centerY;
          this.size = Math.random() * 5 + 2;
          this.vx = (Math.random() - 0.5) * 2;
          this.vy = (Math.random() - 0.5) * 2;
          this.color = colors[Math.floor(Math.random() * colors.length)];
          this.alpha = Math.random();
        }
        update() {
          this.x += this.vx;
          this.y += this.vy;
          
          // Batasi dalam bentuk hati
          if (!isInHeart(this.x, this.y)) {
            this.vx *= -1.1;
            this.vy *= -1.1;
          }
        }
        draw() {
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(${this.color}, ${this.alpha})`;
          ctx.fill();
        }
      }

      function isInHeart(x, y) {
        // Persamaan Matematika Hati
        let dx = (x - centerX) / 15;
        let dy = (y - centerY) / 15;
        // Formula: (x^2 + y^2 - 1)^3 - x^2 * y^3 = 0
        return Math.pow(dx*dx + Math.pow(dy + 0.5*Math.sqrt(Math.abs(dx)), 2) - 50, 3) - dx*dx * Math.pow(dy + 0.5*Math.sqrt(Math.abs(dx)), 3) < 0;
      }
      
      // Sederhanakan pengecekan area agar partikel tetap di tengah
      function isInHeartSimple(px, py) {
        const x = (px - centerX) / 10;
        const y = (py - centerY) / 10;
        return Math.pow((x*x + y*y - 100), 3) - 100 * x*x * y*y*y < 0;
      }

      for (let i = 0; i < 300; i++) particles.push(new Particle());

      function animate() {
        ctx.fillStyle = "rgba(0,0,0,0.1)";
        ctx.fillRect(0, 0, w, h);
        
        particles.forEach(p => {
          p.update();
          p.draw();
        });
        requestAnimationFrame(animate);
      }
      animate();
    })();
  </script>
</body>
</html>
